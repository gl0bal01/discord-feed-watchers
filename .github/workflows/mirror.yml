name: Mirror to Codeberg
on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * 0'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  codeberg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
      - name: Mirror repository
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          if [ -z "$CODEBERG_TOKEN" ]; then
            echo "CODEBERG_TOKEN is not configured; skipping Codeberg mirror."
            exit 0
          fi

          # Use GIT_ASKPASS to avoid embedding the token in the remote URL,
          # which could leak via git remote -v in debug output.
          git remote add codeberg https://gl0bal01@codeberg.org/gl0bal01/discord-feed-watchers.git || true
          export GIT_ASKPASS=$(mktemp)
          echo '#!/bin/sh' > "$GIT_ASKPASS"
          echo 'echo "$CODEBERG_TOKEN"' >> "$GIT_ASKPASS"
          chmod +x "$GIT_ASKPASS"
          # --force: this is a one-way mirror; the target must match this repo.
          git push codeberg --all --force
          git push codeberg --tags --force
          rm -f "$GIT_ASKPASS"
